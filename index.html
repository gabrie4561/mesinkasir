<!DOCTYPE html>
<html>
<head>
    <title>Mesin Kasir</title>
</head>
<body>

<h2>========== MENU MINUMAN ==========</h2>

<div id="order">
    <div>
        Pilih menu:
        <select class="menu">
            <option value="13000">Matcha</option>
            <option value="13000">Taro</option>
            <option value="13000">Coklat</option>
            <option value="13000">Red Velvet</option>
            <option value="13000">Kopi</option>
            <option value="13000">Americano</option>
            <option value="13000">Lemon Tea</option>
            <option value="13000">Coffucino</option>
            <option value="13000">Kopi Latte</option>
            <option value="13000">Strawberry Tea</option>
            <option value="15000">Kopi Susu</option>
            <option value="15000">Lotus</option>
            <option value="15000">Gula Aren</option>
            <option value="16000">Vanila Coff</option>
            <option value="16000">Tiramisu</option>
            <option value="16000">Kopi Caramel</option>
            <option value="20000">Visixty</option>
            <option value="20000">Japanesh</option>
            <option value="8000">Kopi Hitam</option>
            <option value="14000">Sanger</option>
        </select>

        Jumlah:
        <input type="number" class="qty" value="1">
    </div>
</div>

<br>
<button onclick="tambah()">Tambah Pesanan</button>

<br><br>
Uang bayar: <input type="number" id="bayar">

<br><br>
<button onclick="hitung()">Proses</button>

<hr>

<h3>=========== STRUK PEMBAYARAN ===========</h3>
<div id="struk"></div>

<script>
function tambah(){
    let div = document.createElement("div");
    div.innerHTML = `
    Pilih menu:
    <select class="menu">
        <option value="13000">Matcha</option>
        <option value="13000">Taro</option>
        <option value="13000">Coklat</option>
        <option value="13000">Red Velvet</option>
        <option value="13000">Kopi</option>
        <option value="13000">Americano</option>
        <option value="13000">Lemon Tea</option>
        <option value="13000">Coffucino</option>
        <option value="13000">Kopi Latte</option>
        <option value="13000">Strawberry Tea</option>
        <option value="15000">Kopi Susu</option>
        <option value="15000">Lotus</option>
        <option value="15000">Gula Aren</option>
        <option value="16000">Vanila Coff</option>
        <option value="16000">Tiramisu</option>
        <option value="16000">Kopi Caramel</option>
        <option value="20000">Visixty</option>
        <option value="20000">Japanesh</option>
        <option value="8000">Kopi Hitam</option>
        <option value="14000">Sanger</option>
    </select>

    Jumlah:
    <input type="number" class="qty" value="1">
    <br><br>
    `;
    document.getElementById("order").appendChild(div);
}

function hitung(){
    let menus = document.getElementsByClassName("menu");
    let qtys = document.getElementsByClassName("qty");

    let total = 0;
    let hasil = "";

    for(let i=0; i<menus.length; i++){
        let harga = parseInt(menus[i].value);
        let nama = menus[i].options[menus[i].selectedIndex].text;
        let qty = parseInt(qtys[i].value);

        let subtotal = harga * qty;
        total += subtotal;

        hasil += (i+1) + ". " + nama + " x" + qty + " = Rp" + subtotal + "<br>";
    }

    let bayar = parseInt(document.getElementById("bayar").value);
    let kembalian = bayar - total;

    hasil += "<hr>";
    hasil += "Total : Rp" + total + "<br>";
    hasil += "Kembalian : Rp" + kembalian;

    document.getElementById("struk").innerHTML = hasil;
}
</script>

</body>
</html>
